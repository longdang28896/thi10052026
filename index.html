    function norm(v){ return String(v || '').toLowerCase(); }
    function renderList(host, list){
      host.innerHTML = '';
      for(let i=0;i<list.length;i++){
        const it = list[i];
        const div = document.createElement('div');
        div.className = 'item';
        const q = document.createElement('div');
        q.className = 'q';
        q.textContent = 'Cau ' + (i+1) + ': ' + it.q;
        const a = document.createElement('div');
        a.className = 'a';
        a.textContent = 'Đáp án: ' + it.a;
        div.appendChild(q);
        div.appendChild(a);
        host.appendChild(div);
      }
    }

        link.href = '#'+s.id;
        link.textContent = s.title;
        nav.appendChild(link);
      });
      subjects.forEach(s => {
        const sec = document.createElement('section');
        sec.className = 'subject';
        sec.id = s.id;
        sec.style.setProperty('--c', s.color);
        const h2 = document.createElement('h2');
        h2.textContent = s.title;
        const inp = document.createElement('input');
        inp.className = 'search';
        inp.placeholder = s.placeholder;
        const list = document.createElement('div');
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'Khong tim thay cau hoi phu hop.';
        function filter(){
          const k = norm(inp.value.trim());
          const out = !k ? s.items : s.items.filter(x => norm(x.q).includes(k) || norm(x.a).includes(k));
          renderList(list, out);
          empty.style.display = out.length ? 'none' : 'block';
        }
        inp.addEventListener('input', filter);
        sec.appendChild(h2);
        sec.appendChild(inp);
        sec.appendChild(list);
        sec.appendChild(empty);
        app.appendChild(sec);
        filter();
      });
    }
    build();
  </script>
</body>
</html>
